services:
  api:
    build: ../api
    environment:
      - REDIS_URL=${REDIS_URL}
    volumes:
      - ./service-account.json:/app/service-account.json:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
